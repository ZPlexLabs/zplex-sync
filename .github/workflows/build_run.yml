name: build and run

on:
#  schedule:
#    - cron: '0 0 * * *'  # Runs every day at midnight (beginning of the day)
  workflow_dispatch: # Manual trigger

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Set execute permission on Gradle wrapper
        run: chmod +x gradlew

      - name: Clean and build project with Gradle
        run: ./gradlew clean shadowJar

      - name: Upload built JAR
        uses: actions/upload-artifact@v4
        with:
          name: zplex-sync
          path: build/libs/zplex-sync.jar

  run:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Download built JAR
        uses: actions/download-artifact@v4
        with:
          name: zplex-sync
          path: zplex-sync

      - name: Run ZPlexSync
        run: java -jar zplex-sync/zplex-sync.jar
        env:
          # Google Drive
          GOOGLE_DRIVE_CLIENT_EMAIL: ${{ secrets.GOOGLE_DRIVE_CLIENT_EMAIL }}
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_PRIVATE_KEY_ID: ${{ secrets.GOOGLE_DRIVE_PRIVATE_KEY_ID }}
          GOOGLE_DRIVE_PRIVATE_KEY_PKCS8: ${{ secrets.GOOGLE_DRIVE_PRIVATE_KEY_PKCS8 }}

          # Media folders
          MOVIES_FOLDER: ${{ secrets.MOVIES_FOLDER }}
          SHOWS_FOLDER: ${{ secrets.SHOWS_FOLDER }}

          # Postgres
          ZPLEX_DATABASE_HOST: ${{ secrets.ZPLEX_DATABASE_HOST }}
          ZPLEX_DATABASE_PORT: ${{ secrets.ZPLEX_DATABASE_PORT }}
          ZPLEX_DATABASE_USERNAME: ${{ secrets.ZPLEX_DATABASE_USERNAME }}
          ZPLEX_DATABASE_PASSWORD: ${{ secrets.ZPLEX_DATABASE_PASSWORD }}

          # Cache
          ZPLEX_CACHE_HOST: ${{ secrets.ZPLEX_CACHE_HOST }}
          ZPLEX_CACHE_PORT: ${{ secrets.ZPLEX_CACHE_PORT }}
          ZPLEX_CACHE_USERNAME: ${{ secrets.ZPLEX_CACHE_USERNAME }}
          ZPLEX_CACHE_PASSWORD: ${{ secrets.ZPLEX_CACHE_PASSWORD }}

          # APIs
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}